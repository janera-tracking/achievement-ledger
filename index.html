<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Achievement Ledger | Strategic Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration & State
        let db, auth, user = null;
        let appId = typeof __app_id !== 'undefined' ? __app_id : 'ledger-v2-prod';
        let currentDate = new Date().toISOString().split('T')[0];
        let dailyDb = {}; 
        let globalData = { northStar: "" };
        let unsubscribeDoc = null;

        const ptsMap = { legacy: 5, engine: 3, fuel: 1 };

        const getActiveUid = () => {
            return localStorage.getItem('sync_uid') || (auth?.currentUser?.uid) || "CONNECTING...";
        };

        const calculateScore = () => {
            const data = dailyDb[currentDate];
            if (!data || !data.tasks) return 0;
            
            let score = 0;
            // Task Points
            Object.keys(ptsMap).forEach(cat => {
                const tasks = data.tasks[cat] || [];
                tasks.forEach(t => {
                    if (t.completed) score += ptsMap[cat];
                });
            });
            // Strategy Filter Points
            const filters = data.filters || [false, false, false, false];
            const filterPoints = filters.filter(f => f).length * 2;
            return score + filterPoints;
        };

        const updateUI = () => {
            if (!dailyDb[currentDate]) {
                dailyDb[currentDate] = { 
                    dailyNotes: "", 
                    target: 22, 
                    filters: [false, false, false, false], 
                    tasks: { fuel: [], engine: [], legacy: [] } 
                };
            }
            const data = dailyDb[currentDate];
            const currentScore = calculateScore();
            const target = data.target || 22;
            const percent = Math.min(Math.round((currentScore / target) * 100), 100);

            // Header Stats
            document.getElementById('dailyScoreDisplay').innerText = currentScore;
            document.getElementById('targetDisplay').innerText = target;
            document.getElementById('percentText').innerText = `${percent}%`;
            
            const circle = document.getElementById('progressCircle');
            const circumference = 22 * 2 * Math.PI;
            circle.style.strokeDashoffset = circumference - (percent / 100) * circumference;

            // Date & ID
            document.getElementById('datePicker').value = currentDate;
            document.getElementById('myIdDisplay').innerText = getActiveUid();

            // Content Fields
            document.getElementById('northStar').value = globalData.northStar || "";
            document.getElementById('dailyNotes').value = data.dailyNotes || "";

            // Strategy Filters
            for(let i=0; i<4; i++) {
                const el = document.getElementById('filter' + (i+1));
                if (el) el.checked = (data.filters || [])[i];
            }

            // Task List Rendering
            ['legacy', 'engine', 'fuel'].forEach(cat => {
                const container = document.getElementById(cat + 'Tasks');
                if (!container) return;
                container.innerHTML = '';
                
                const tasks = data.tasks[cat] || [];
                tasks.forEach(task => {
                    const div = document.createElement('div');
                    div.className = `flex items-center justify-between group bg-white p-3 rounded-xl border border-slate-100 transition-all ${task.priority ? 'border-l-4 border-l-amber-400 bg-amber-50/30' : ''}`;
                    div.innerHTML = `
                        <div class="flex items-center gap-3 flex-1">
                            <button class="check-btn w-5 h-5 rounded border-2 flex items-center justify-center transition-all ${task.completed ? 'bg-emerald-500 border-emerald-500' : 'border-slate-200 bg-slate-50'}">
                                ${task.completed ? '<i class="fa-solid fa-check text-[10px] text-white"></i>' : ''}
                            </button>
                            <span contenteditable="true" class="text-sm font-medium text-slate-700 outline-none flex-1 ${task.completed ? 'line-through opacity-40' : ''}">${task.text}</span>
                        </div>
                        <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100">
                            <button class="p-1 hover:text-amber-500 ${task.priority ? 'text-amber-500' : 'text-slate-300'}" onclick="event.stopPropagation(); togglePriority('${cat}', ${task.id})"><i class="fa-solid fa-star text-xs"></i></button>
                            <button class="p-1 hover:text-red-500 text-slate-300" onclick="event.stopPropagation(); deleteTask('${cat}', ${task.id})"><i class="fa-solid fa-trash text-xs"></i></button>
                        </div>
                    `;
                    
                    const span = div.querySelector('span');
                    span.addEventListener('blur', () => {
                        task.text = span.innerText;
                        syncToCloud();
                    });
                    
                    div.querySelector('.check-btn').onclick = () => {
                        task.completed = !task.completed;
                        updateUI();
                        syncToCloud();
                    };
                    
                    container.appendChild(div);
                });
            });
        };

        const syncToCloud = async () => {
            const uid = getActiveUid();
            if (uid.includes("...") || !db) return;
            
            try {
                document.getElementById('syncStatus').innerText = "Syncing...";
                await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'settings', 'global'), globalData);
                await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'days', currentDate), dailyDb[currentDate]);
                document.getElementById('syncStatus').innerText = "Saved";
                setTimeout(() => { if(document.getElementById('syncStatus').innerText === "Saved") document.getElementById('syncStatus').innerText = ""; }, 2000);
            } catch (e) {
                console.error(e);
                document.getElementById('syncStatus').innerText = "Sync Error";
            }
        };

        window.addTask = (cat) => {
            const input = document.getElementById(cat + 'Input');
            const val = input.value.trim();
            if (!val) return;

            if (!dailyDb[currentDate].tasks[cat]) dailyDb[currentDate].tasks[cat] = [];
            dailyDb[currentDate].tasks[cat].push({
                id: Date.now(),
                text: val,
                completed: false,
                priority: false
            });

            input.value = '';
            updateUI();
            syncToCloud();
        };

        window.togglePriority = (cat, id) => {
            const task = dailyDb[currentDate].tasks[cat].find(t => t.id === id);
            if (task) { task.priority = !task.priority; updateUI(); syncToCloud(); }
        };

        window.deleteTask = (cat, id) => {
            dailyDb[currentDate].tasks[cat] = dailyDb[currentDate].tasks[cat].filter(t => t.id !== id);
            updateUI();
            syncToCloud();
        };

        window.updateFilter = (index, checked) => {
            if (!dailyDb[currentDate].filters) dailyDb[currentDate].filters = [false, false, false, false];
            dailyDb[currentDate].filters[index] = checked;
            updateUI();
            syncToCloud();
        };

        window.changeDate = (offset) => {
            const d = new Date(currentDate);
            d.setDate(d.getDate() + offset);
            currentDate = d.toISOString().split('T')[0];
            setupListener();
        };

        window.setManualId = () => {
            const id = prompt("Enter Device ID to sync with:");
            if (id && id.trim().length > 5) {
                localStorage.setItem('sync_uid', id.trim());
                location.reload();
            }
        };

        const setupListener = () => {
            const uid = getActiveUid();
            if (uid.includes("...") || !db) return;
            
            if (unsubscribeDoc) unsubscribeDoc();
            unsubscribeDoc = onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'days', currentDate), (snap) => {
                if (snap.exists()) {
                    dailyDb[currentDate] = snap.data();
                    updateUI();
                }
            });
        };

        const init = async () => {
            try {
                const config = JSON.parse(__firebase_config);
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (u) => {
                    user = u;
                    const uid = getActiveUid();
                    const globalSnap = await getDoc(doc(db, 'artifacts', appId, 'users', uid, 'settings', 'global'));
                    if (globalSnap.exists()) globalData = globalSnap.data();
                    setupListener();
                    updateUI();
                });
            } catch (e) {
                document.getElementById('myIdDisplay').innerText = "OFFLINE_MODE";
                updateUI();
            }
        };

        document.getElementById('northStar').oninput = (e) => { globalData.northStar = e.target.value; syncToCloud(); };
        document.getElementById('dailyNotes').oninput = (e) => { dailyDb[currentDate].dailyNotes = e.target.value; syncToCloud(); };
        
        window.onload = init;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f7f9; }
        .glass-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
        .tier-card { transition: transform 0.2s; }
        .tier-card:hover { transform: translateY(-2px); }
        .progress-ring__circle { transition: stroke-dashoffset 0.5s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        input[type="checkbox"] { accent-color: #10b981; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 pb-24">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Achievement Ledger</h1>
                <p class="text-indigo-600 font-bold uppercase text-[10px] tracking-[0.2em] mt-1">Consultant ⮕ Home Impact Developer</p>
            </div>

            <div class="flex items-center gap-4">
                <div class="bg-white p-2 px-4 rounded-2xl border flex items-center gap-4">
                    <button onclick="changeDate(-1)" class="text-slate-400 hover:text-slate-900"><i class="fa-solid fa-chevron-left"></i></button>
                    <input type="date" id="datePicker" onchange="currentDate=this.value; setupListener();" class="font-bold text-slate-700 outline-none cursor-pointer">
                    <button onclick="changeDate(1)" class="text-slate-400 hover:text-slate-900"><i class="fa-solid fa-chevron-right"></i></button>
                </div>

                <div class="bg-white p-3 px-6 rounded-2xl border flex items-center gap-6">
                    <div class="relative flex items-center justify-center">
                        <svg width="50" height="50">
                            <circle class="text-slate-100" stroke-width="4" stroke="currentColor" fill="transparent" r="22" cx="25" cy="25"/>
                            <circle id="progressCircle" class="progress-ring__circle text-emerald-500" stroke-width="4" stroke-dasharray="138.23" stroke-dashoffset="138.23" stroke-linecap="round" stroke="currentColor" fill="transparent" r="22" cx="25" cy="25"/>
                        </svg>
                        <span id="percentText" class="absolute text-[10px] font-bold text-slate-800">0%</span>
                    </div>
                    <div>
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Daily Score</p>
                        <div class="flex items-baseline gap-1">
                            <span id="dailyScoreDisplay" class="text-2xl font-black text-slate-900">0</span>
                            <span class="text-slate-300 font-bold">/</span>
                            <span id="targetDisplay" class="text-slate-400 font-bold">22</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Left Column: Strategy -->
            <div class="lg:col-span-7 space-y-8">
                <!-- North Star -->
                <div class="glass-card p-8 border-l-[12px] border-emerald-500 shadow-sm">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fa-solid fa-compass text-emerald-500"></i>
                        <h2 class="font-bold uppercase text-xs tracking-widest text-slate-800">The North Star</h2>
                    </div>
                    <textarea id="northStar" class="w-full h-24 text-slate-600 text-lg font-medium bg-transparent outline-none resize-none leading-relaxed" placeholder="Become a residential real estate developer..."></textarea>
                </div>

                <!-- Daily Filters -->
                <div class="glass-card p-8">
                    <h2 class="font-bold uppercase text-xs tracking-widest text-slate-400 mb-6">Strategic Filters (+2 pts each)</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <label class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:bg-emerald-50/50 transition-all">
                            <input type="checkbox" id="filter1" onchange="updateFilter(0, this.checked)" class="w-5 h-5 rounded border-slate-300">
                            <span class="text-xs font-bold text-slate-700">Clinical Impact Verified</span>
                        </label>
                        <label class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:bg-emerald-50/50 transition-all">
                            <input type="checkbox" id="filter2" onchange="updateFilter(1, this.checked)" class="w-5 h-5 rounded border-slate-300">
                            <span class="text-xs font-bold text-slate-700">Operational Leverage</span>
                        </label>
                        <label class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:bg-emerald-50/50 transition-all">
                            <input type="checkbox" id="filter3" onchange="updateFilter(2, this.checked)" class="w-5 h-5 rounded border-slate-300">
                            <span class="text-xs font-bold text-slate-700">Scaling Potential</span>
                        </label>
                        <label class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:bg-emerald-50/50 transition-all">
                            <input type="checkbox" id="filter4" onchange="updateFilter(3, this.checked)" class="w-5 h-5 rounded border-slate-300">
                            <span class="text-xs font-bold text-slate-700">Equity/Asset Building</span>
                        </label>
                    </div>
                </div>

                <!-- Log -->
                <div class="bg-slate-900 rounded-[2rem] p-8 text-white shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-center mb-6 relative z-10">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-rocket text-indigo-400"></i>
                            <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Log</h2>
                        </div>
                        <span id="syncStatus" class="text-[10px] font-mono text-indigo-400">Waiting...</span>
                    </div>
                    <textarea id="dailyNotes" class="w-full h-64 bg-slate-800/40 rounded-2xl p-6 text-slate-300 border border-slate-700/50 outline-none focus:border-indigo-500/50 transition-all" placeholder="Insights, breakthroughs, daily wins..."></textarea>
                    <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-600/10 blur-[100px]"></div>
                </div>
            </div>

            <!-- Right Column: Tiers -->
            <div class="lg:col-span-5 space-y-6">
                <!-- Legacy -->
                <div class="glass-card p-6 border-t-8 border-emerald-500 tier-card">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Tier 3: Legacy</h3>
                        <span class="text-[10px] font-bold bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full">+5 PTS</span>
                    </div>
                    <div id="legacyTasks" class="space-y-3 mb-4"></div>
                    <div class="relative">
                        <input type="text" id="legacyInput" class="w-full p-4 pr-12 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-semibold outline-none focus:border-emerald-300" placeholder="Legacy goal...">
                        <button onclick="addTask('legacy')" class="absolute right-2 top-2 w-10 h-10 bg-emerald-500 text-white rounded-xl hover:bg-emerald-600"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <!-- Engine -->
                <div class="glass-card p-6 border-t-8 border-indigo-500 tier-card">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Tier 2: Engine</h3>
                        <span class="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full">+3 PTS</span>
                    </div>
                    <div id="engineTasks" class="space-y-3 mb-4"></div>
                    <div class="relative">
                        <input type="text" id="engineInput" class="w-full p-4 pr-12 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-semibold outline-none focus:border-indigo-300" placeholder="Engine goal...">
                        <button onclick="addTask('engine')" class="absolute right-2 top-2 w-10 h-10 bg-indigo-500 text-white rounded-xl hover:bg-indigo-600"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <!-- Fuel -->
                <div class="glass-card p-6 border-t-8 border-blue-500 tier-card">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Tier 1: Fuel</h3>
                        <span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-3 py-1 rounded-full">+1 PT</span>
                    </div>
                    <div id="fuelTasks" class="space-y-3 mb-4"></div>
                    <div class="relative">
                        <input type="text" id="fuelInput" class="w-full p-4 pr-12 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-semibold outline-none focus:border-blue-300" placeholder="Fuel goal...">
                        <button onclick="addTask('fuel')" class="absolute right-2 top-2 w-10 h-10 bg-blue-500 text-white rounded-xl hover:bg-blue-600"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <!-- Weekly Performance Placeholder -->
                <div class="glass-card p-8 bg-slate-50/50 border-dashed border-2 flex flex-col items-center justify-center text-center">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-2">Weekly Performance (%)</h3>
                    <div class="w-full h-24 flex items-end justify-between gap-1 mt-4">
                        <div class="w-full bg-slate-200 rounded-t-sm" style="height: 40%"></div>
                        <div class="w-full bg-slate-200 rounded-t-sm" style="height: 60%"></div>
                        <div class="w-full bg-slate-200 rounded-t-sm" style="height: 30%"></div>
                        <div class="w-full bg-slate-200 rounded-t-sm" style="height: 80%"></div>
                        <div class="w-full bg-indigo-400 rounded-t-sm" style="height: 90%"></div>
                        <div class="w-full bg-slate-200 rounded-t-sm" style="height: 50%"></div>
                        <div class="w-full bg-slate-100 rounded-t-sm" style="height: 10%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sync Bar -->
    <div class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-md border-t p-4 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2 text-[10px] font-mono">
                <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                <span class="text-slate-400 uppercase">My Device ID:</span>
                <span id="myIdDisplay" class="text-indigo-600 font-bold select-all">CONNECTING...</span>
            </div>
            <button onclick="setManualId()" class="bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest px-8 py-3 rounded-xl hover:bg-indigo-600 transition-all shadow-lg">
                Sync Device
            </button>
        </div>
    </div>

</body>
</html>
