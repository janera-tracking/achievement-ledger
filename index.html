<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Achievement Ledger | Strategic Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State
        let db, auth, user = null;
        let globalData = { northStar: "Become a residential real estate developer..." };
        let dailyDb = {}; 
        let currentDate = new Date().toISOString().split('T')[0];
        let unsubscribeDoc = null;
        let appId = typeof __app_id !== 'undefined' ? __app_id : 'achievement-tracker-prod';

        const logDebug = (msg) => {
            const consoleEl = document.getElementById('debugConsole');
            if (consoleEl) consoleEl.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        };

        const getActiveUid = () => {
            const override = localStorage.getItem('sync_uid');
            return override || auth?.currentUser?.uid || "OFFLINE_USER";
        };

        const updateScoreUI = (score, target) => {
            const validTarget = parseInt(target) || 22;
            const percent = Math.min(Math.round((score / validTarget) * 100), 100);
            
            document.getElementById('dailyScoreDisplay').innerText = score;
            document.getElementById('percentDisplay').innerText = `${percent}%`;
            
            const circle = document.getElementById('progressCircle');
            const circumference = 22 * 2 * Math.PI; // r=22
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        };

        const updateUI = () => {
            if (!dailyDb[currentDate]) {
                dailyDb[currentDate] = { dailyNotes: "", target: 22, filters: [false, false, false, false], tasks: { fuel: [], engine: [], legacy: [] } };
            }
            const data = dailyDb[currentDate];
            
            document.getElementById('northStar').value = globalData.northStar || "";
            document.getElementById('dailyNotes').value = data.dailyNotes || "";
            document.getElementById('targetDisplay').innerText = data.target || 22;
            document.getElementById('logDateLabel').innerText = currentDate === new Date().toISOString().split('T')[0] ? "Today's Achievement Log" : `Log for ${currentDate}`;
            document.getElementById('myIdDisplay').innerText = getActiveUid();

            // Filters
            for(let i=1; i<=4; i++) {
                const el = document.getElementById('filter'+i);
                if (el) el.checked = (data.filters || [])[i-1] || false;
            }

            // Task Rendering & Score Calculation
            let currentScore = 0;
            const ptsMapping = { fuel: 1, engine: 3, legacy: 5 };

            ['fuel', 'engine', 'legacy'].forEach(cat => {
                const container = document.getElementById(cat + 'Tasks');
                if (!container) return;
                container.innerHTML = '';
                
                const tasks = data.tasks?.[cat] || [];
                tasks.forEach(task => {
                    if (task.completed) currentScore += ptsMapping[cat];

                    const div = document.createElement('div');
                    div.className = `flex items-center justify-between group bg-white p-2 rounded-lg border border-transparent transition-all ${task.priority ? 'priority-task shadow-sm' : ''}`;
                    div.innerHTML = `
                        <div class="flex items-center gap-3 flex-1">
                            <button class="check-btn w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all cursor-pointer ${task.completed ? 'bg-indigo-600 border-indigo-600' : 'border-slate-200 bg-slate-50'}">
                                ${task.completed ? '<i class="fa-solid fa-check text-xs text-white"></i>' : ''}
                            </button>
                            <span contenteditable="true" class="text-xs font-bold text-slate-700 editable-text cursor-text flex-1 ${task.completed ? 'strikethrough' : ''}">${task.text}</span>
                        </div>
                        <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all">
                            <button class="priority-btn ${task.priority ? 'text-amber-500' : 'text-slate-300'} hover:text-amber-500 p-1"><i class="fa-solid fa-star text-[10px]"></i></button>
                            <button class="delete-btn text-slate-300 hover:text-red-500 p-1"><i class="fa-solid fa-xmark text-[10px]"></i></button>
                        </div>
                    `;
                    div.querySelector('.check-btn').onclick = () => toggleTask(cat, task.id);
                    div.querySelector('.priority-btn').onclick = () => togglePriority(cat, task.id);
                    div.querySelector('.delete-btn').onclick = () => deleteTask(cat, task.id);
                    const span = div.querySelector('span');
                    span.onblur = () => editTaskText(cat, task.id, span.innerText);
                    container.appendChild(div);
                });
            });

            // Add Strategy Filter points
            const filterBonus = (data.filters || []).filter(f => f).length * 2;
            currentScore += filterBonus;
            
            const badge = document.getElementById('bonusBadge');
            if (filterBonus > 0) { 
                badge.classList.remove('hidden'); 
                badge.innerText = `+${filterBonus} STRATEGY`; 
            } else { 
                badge.classList.add('hidden'); 
            }

            updateScoreUI(currentScore, data.target || 22);
        };

        const syncToCloud = async () => {
            const uid = getActiveUid();
            if (uid === "OFFLINE_USER" || !db) {
                localStorage.setItem('local_data', JSON.stringify({globalData, dailyDb}));
                return;
            }
            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'settings', 'global'), globalData);
                if (dailyDb[currentDate]) {
                    await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'days', currentDate), dailyDb[currentDate]);
                }
                document.getElementById('timestampDisplay').innerText = `Saved: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
            } catch (e) { logDebug("Cloud Error: " + e.message); }
        };

        const toggleTask = (cat, id) => {
            const task = dailyDb[currentDate].tasks[cat].find(t => t.id === id);
            if (task) { 
                task.completed = !task.completed; 
                updateUI(); 
                syncToCloud(); 
            }
        };

        const togglePriority = (cat, id) => {
            const task = dailyDb[currentDate].tasks[cat].find(t => t.id === id);
            if (task) { 
                task.priority = !task.priority; 
                updateUI(); 
                syncToCloud(); 
            }
        };

        const deleteTask = (cat, id) => {
            dailyDb[currentDate].tasks[cat] = dailyDb[currentDate].tasks[cat].filter(t => t.id !== id);
            updateUI(); 
            syncToCloud();
        };

        const editTaskText = (cat, id, text) => {
            const task = dailyDb[currentDate].tasks[cat].find(t => t.id === id);
            if (task) { 
                task.text = text; 
                syncToCloud(); 
            }
        };

        window.addTask = (cat) => {
            const input = document.getElementById(cat + 'Input');
            const val = input.value.trim();
            if (!val) return;

            if (!dailyDb[currentDate].tasks) dailyDb[currentDate].tasks = { fuel: [], engine: [], legacy: [] };
            if (!dailyDb[currentDate].tasks[cat]) dailyDb[currentDate].tasks[cat] = [];

            dailyDb[currentDate].tasks[cat].push({ 
                id: Date.now(), 
                text: val, 
                completed: false, 
                priority: false 
            });

            input.value = ''; 
            updateUI(); 
            syncToCloud();
        };

        window.updateTarget = (el) => {
            dailyDb[currentDate].target = parseInt(el.innerText) || 22;
            updateUI();
            syncToCloud();
        };

        window.changeDate = (days) => {
            let current = new Date(currentDate);
            current.setDate(current.getDate() + days);
            currentDate = current.toISOString().split('T')[0];
            document.getElementById('datePicker').value = currentDate;
            setupRealtimeListener();
        };

        window.loadSelectedDate = () => {
            currentDate = document.getElementById('datePicker').value;
            setupRealtimeListener();
        };

        window.setSyncId = () => {
            const id = prompt("Enter the ID from your other device to sync data:");
            if (id && id.trim().length > 5) {
                localStorage.setItem('sync_uid', id.trim());
                location.reload();
            }
        };

        const setupRealtimeListener = () => {
            const uid = getActiveUid();
            if (uid === "OFFLINE_USER" || !db) {
                updateUI();
                return;
            }
            if (unsubscribeDoc) unsubscribeDoc();
            unsubscribeDoc = onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'days', currentDate), (docSnap) => {
                if (docSnap.exists()) { 
                    dailyDb[currentDate] = docSnap.data(); 
                } else {
                    dailyDb[currentDate] = { dailyNotes: "", target: 22, filters: [false, false, false, false], tasks: { fuel: [], engine: [], legacy: [] } };
                }
                updateUI();
            }, (err) => logDebug("Sync Error: " + err.message));
        };

        const init = async () => {
            let config;
            try {
                const envConfig = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                if (!envConfig) throw new Error("Offline");
                config = JSON.parse(envConfig);
            } catch (e) {
                logDebug("Offline Mode Activated");
                const local = JSON.parse(localStorage.getItem('local_data') || '{}');
                if (local.globalData) globalData = local.globalData;
                if (local.dailyDb) dailyDb = local.dailyDb;
                updateUI();
                return;
            }

            const app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, async (u) => {
                user = u;
                const uid = getActiveUid();
                document.getElementById('myIdDisplay').innerText = uid;
                try {
                    const globalSnap = await getDoc(doc(db, 'artifacts', appId, 'users', uid, 'settings', 'global'));
                    if (globalSnap.exists()) globalData = globalSnap.data();
                } catch(e) {}
                document.getElementById('datePicker').value = currentDate;
                setupRealtimeListener();
            });
        };

        document.getElementById('northStar').oninput = () => { globalData.northStar = document.getElementById('northStar').value; syncToCloud(); };
        document.getElementById('dailyNotes').oninput = () => { 
            dailyDb[currentDate].dailyNotes = document.getElementById('dailyNotes').value; 
            syncToCloud(); 
        };
        
        window.onload = init;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .card { background: white; border-radius: 1.25rem; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
        .strikethrough { text-decoration: line-through; opacity: 0.4; }
        .priority-task { border-left: 4px solid #f59e0b !important; background-color: #fffbeb !important; }
        .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .editable-text:focus { outline: none; background: #f1f5f9; border-radius: 4px; padding: 0 4px; }
        #debugConsole { font-family: monospace; font-size: 9px; color: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8 pb-40">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-slate-900">Achievement Ledger</h1>
                <p class="text-indigo-600 font-bold uppercase text-[10px] tracking-widest mt-1">Consultant ⮕ Home Impact Developer</p>
                <div id="debugConsole" class="mt-1">Initializing...</div>
            </div>
            
            <div class="flex flex-wrap items-center gap-4 bg-white p-2 rounded-2xl border border-slate-200 shadow-sm w-full lg:w-auto">
                <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl flex-1 justify-between lg:justify-start">
                    <button onclick="changeDate(-1)" class="p-2 hover:bg-white text-slate-500 rounded-lg"><i class="fa-solid fa-chevron-left"></i></button>
                    <input type="date" id="datePicker" onchange="loadSelectedDate()" class="bg-transparent border-none font-bold text-sm px-1 outline-none text-center text-slate-700">
                    <button onclick="changeDate(1)" class="p-2 hover:bg-white text-slate-500 rounded-lg"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                
                <div class="flex items-center gap-4 px-4 py-1">
                    <div class="relative flex items-center justify-center">
                        <svg width="54" height="54">
                            <circle class="text-slate-100" stroke-width="5" stroke="currentColor" fill="transparent" r="22" cx="27" cy="27"/>
                            <circle id="progressCircle" class="progress-ring__circle text-indigo-600" stroke-width="5" stroke-dasharray="138.23" stroke-dashoffset="138.23" stroke-linecap="round" stroke="currentColor" fill="transparent" r="22" cx="27" cy="27"/>
                        </svg>
                        <div class="absolute text-[10px] font-black text-slate-700" id="percentDisplay">0%</div>
                    </div>
                    <div>
                        <div class="flex items-center gap-2">
                            <p class="text-[9px] font-black text-slate-400 uppercase leading-none">Daily Score</p>
                            <span id="bonusBadge" class="hidden text-[8px] font-black bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-full"></span>
                        </div>
                        <div class="flex items-baseline gap-1">
                            <p id="dailyScoreDisplay" class="text-xl font-black text-slate-800">0</p>
                            <p class="text-slate-300 font-bold text-xs">/</p>
                            <span contenteditable="true" id="targetDisplay" onblur="updateTarget(this)" class="text-xs font-bold text-slate-400">22</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 space-y-6">
                <div class="card p-6 border-l-[10px] border-l-emerald-500 bg-emerald-50/20">
                    <h2 class="font-black text-slate-800 uppercase text-xs tracking-wider mb-4">The North Star</h2>
                    <textarea id="northStar" class="w-full h-24 p-4 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500/20" placeholder="High-level vision..."></textarea>
                </div>

                <div class="card p-6 bg-white border border-slate-200">
                    <h2 class="font-black text-slate-800 uppercase text-xs tracking-wider mb-4">Daily Filter Strategy (+2 pts each)</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-all border border-slate-100">
                            <input type="checkbox" id="filter1" class="w-4 h-4 rounded text-indigo-600">
                            <span class="text-[11px] font-bold text-slate-600">Clinical Impact Verified</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-all border border-slate-100">
                            <input type="checkbox" id="filter2" class="w-4 h-4 rounded text-indigo-600">
                            <span class="text-[11px] font-bold text-slate-600">Operational Leverage</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-all border border-slate-100">
                            <input type="checkbox" id="filter3" class="w-4 h-4 rounded text-indigo-600">
                            <span class="text-[11px] font-bold text-slate-600">Scaling Potential</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-all border border-slate-100">
                            <input type="checkbox" id="filter4" class="w-4 h-4 rounded text-indigo-600">
                            <span class="text-[11px] font-bold text-slate-600">Equity/Asset Building</span>
                        </label>
                    </div>
                </div>

                <div class="card bg-slate-900 p-6 text-white overflow-hidden">
                    <div class="flex justify-between items-center mb-4 text-xs font-bold">
                        <span id="logDateLabel">Log</span>
                        <span class="text-slate-500 font-mono text-[10px]" id="timestampDisplay">Waiting...</span>
                    </div>
                    <textarea id="dailyNotes" class="w-full h-72 bg-slate-800/50 border border-slate-700 rounded-xl p-5 text-sm text-slate-200 outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="Insights, breakthroughs..."></textarea>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <!-- Legacy Tier -->
                <div class="card p-6 border-t-4 border-t-emerald-500">
                    <div class="flex justify-between mb-4 text-[10px] font-black uppercase tracking-widest text-slate-400">
                        <span>Legacy (High Impact)</span>
                        <span class="text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full">+5 pts</span>
                    </div>
                    <div id="legacyTasks" class="space-y-3 mb-5"></div>
                    <form onsubmit="event.preventDefault(); window.addTask('legacy');" class="flex gap-2">
                        <input type="text" id="legacyInput" class="flex-1 text-xs font-semibold p-3 bg-slate-50 border rounded-xl outline-none focus:border-indigo-300" placeholder="Asset building goal...">
                        <button type="submit" class="bg-emerald-500 text-white px-4 rounded-xl hover:bg-emerald-600"><i class="fa-solid fa-plus"></i></button>
                    </form>
                </div>

                <!-- Engine Tier -->
                <div class="card p-6 border-t-4 border-t-indigo-500">
                    <div class="flex justify-between mb-4 text-[10px] font-black uppercase tracking-widest text-slate-400">
                        <span>Engine (Core Business)</span>
                        <span class="text-indigo-600 bg-indigo-50 px-2 py-1 rounded-full">+3 pts</span>
                    </div>
                    <div id="engineTasks" class="space-y-3 mb-5"></div>
                    <form onsubmit="event.preventDefault(); window.addTask('engine');" class="flex gap-2">
                        <input type="text" id="engineInput" class="flex-1 text-xs font-semibold p-3 bg-slate-50 border rounded-xl outline-none focus:border-indigo-300" placeholder="Revenue generating...">
                        <button type="submit" class="bg-indigo-500 text-white px-4 rounded-xl hover:bg-indigo-600"><i class="fa-solid fa-plus"></i></button>
                    </form>
                </div>

                <!-- Fuel Tier -->
                <div class="card p-6 border-t-4 border-t-blue-500">
                    <div class="flex justify-between mb-4 text-[10px] font-black uppercase tracking-widest text-slate-400">
                        <span>Fuel (Foundations)</span>
                        <span class="text-blue-600 bg-blue-50 px-2 py-1 rounded-full">+1 pt</span>
                    </div>
                    <div id="fuelTasks" class="space-y-3 mb-5"></div>
                    <form onsubmit="event.preventDefault(); window.addTask('fuel');" class="flex gap-2">
                        <input type="text" id="fuelInput" class="flex-1 text-xs font-semibold p-3 bg-slate-50 border rounded-xl outline-none focus:border-indigo-300" placeholder="Daily habit/system...">
                        <button type="submit" class="bg-blue-500 text-white px-4 rounded-xl hover:bg-blue-600"><i class="fa-solid fa-plus"></i></button>
                    </form>
                </div>
            </div>
        </div>

        <footer class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t p-4 z-50">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-[10px] text-slate-400 font-mono flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    ID: <span id="myIdDisplay" class="text-indigo-600 font-bold select-all tracking-wider">...</span>
                </div>
                <button onclick="window.setSyncId()" class="text-xs font-black uppercase tracking-widest px-6 py-2 bg-slate-900 text-white rounded-xl hover:bg-indigo-600 transition-all">
                    <i class="fa-solid fa-sync mr-2"></i> Sync Devices
                </button>
            </div>
        </footer>
    </div>
</body>
</html>
</html>
