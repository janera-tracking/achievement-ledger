<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Achievement Ledger | Stable Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ledger-stable-v1';

        // Internal State
        let currentUser = null;
        let currentDate = new Date().toISOString().split('T')[0];
        
        let state = {
            dailyNotes: "",
            target: 22,
            filters: [false, false, false, false],
            tasks: { legacy: [], engine: [], fuel: [] },
            northStar: ""
        };

        // --- AUTH & SYNC ---
        const init = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth Error:", e);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('displayId').innerText = user.uid;
                setupListeners(user.uid);
            }
        });

        function setupListeners(uid) {
            // Global Settings Listener (North Star)
            onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'settings', 'global'), (snap) => {
                if (snap.exists()) {
                    state.northStar = snap.data().northStar || "";
                    document.getElementById('northStar').value = state.northStar;
                }
            }, (err) => console.error("Global Sync Error:", err));

            // Daily Data Listener
            onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'days', currentDate), (snap) => {
                document.getElementById('syncStatus').innerText = "LIVE";
                if (snap.exists()) {
                    const data = snap.data();
                    // Merge incoming data into local state
                    state.dailyNotes = data.dailyNotes || "";
                    state.filters = data.filters || [false, false, false, false];
                    state.tasks = data.tasks || { legacy: [], engine: [], fuel: [] };
                    render();
                } else {
                    // Initialize if empty
                    saveState();
                }
            }, (err) => {
                document.getElementById('syncStatus').innerText = "OFFLINE";
                console.error("Daily Sync Error:", err);
            });
        }

        // --- DATABASE PERSISTENCE ---
        async function saveState() {
            if (!currentUser) return;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'days', currentDate), {
                    dailyNotes: state.dailyNotes,
                    filters: state.filters,
                    tasks: state.tasks,
                    updatedAt: Date.now()
                });
            } catch (e) {
                console.error("Save Error:", e);
            }
        }

        async function saveNorthStar() {
            if (!currentUser) return;
            await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'global'), {
                northStar: state.northStar
            });
        }

        // --- CORE ACTIONS ---
        window.addTask = (tier) => {
            const input = document.getElementById(`${tier}Input`);
            const text = input.value.trim();
            if (!text) return;

            if (!state.tasks[tier]) state.tasks[tier] = [];
            
            state.tasks[tier].push({
                id: Date.now(),
                text: text,
                completed: false
            });

            input.value = "";
            render(); // Immediate UI feedback
            saveState(); // Sync to DB
        };

        window.toggleTask = (tier, id) => {
            const task = state.tasks[tier].find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                render();
                saveState();
            }
        };

        window.deleteTask = (tier, id) => {
            state.tasks[tier] = state.tasks[tier].filter(t => t.id !== id);
            render();
            saveState();
        };

        window.updateFilter = (idx, checked) => {
            state.filters[idx] = checked;
            render();
            saveState();
        };

        window.updateNotes = (val) => {
            state.dailyNotes = val;
            // Debounced save would be better, but direct save for now
            saveState();
        };

        window.updateNorthStar = (val) => {
            state.northStar = val;
            saveNorthStar();
        };

        // --- RENDERING ---
        function render() {
            document.getElementById('dateDisplay').innerText = new Date(currentDate).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            document.getElementById('dailyNotes').value = state.dailyNotes;
            
            // Checkboxes
            state.filters.forEach((val, i) => {
                const el = document.getElementById(`filter${i}`);
                if (el) el.checked = !!val;
            });

            let totalScore = 0;
            const points = { legacy: 5, engine: 3, fuel: 1 };

            ['legacy', 'engine', 'fuel'].forEach(tier => {
                const container = document.getElementById(`${tier}Tasks`);
                container.innerHTML = "";
                
                (state.tasks[tier] || []).forEach(task => {
                    if (task.completed) totalScore += points[tier];
                    
                    const item = document.createElement('div');
                    item.className = `flex items-center gap-3 p-3 bg-white border border-slate-100 rounded-xl shadow-sm mb-2 group animate-in fade-in slide-in-from-right-2 duration-200`;
                    item.innerHTML = `
                        <button onclick="window.toggleTask('${tier}', ${task.id})" class="w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all ${task.completed ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200 hover:border-emerald-300'}">
                            ${task.completed ? '<i class="fa-solid fa-check text-[12px]"></i>' : ''}
                        </button>
                        <span class="text-sm font-bold text-slate-700 flex-1 ${task.completed ? 'line-through opacity-40' : ''}">${task.text}</span>
                        <button onclick="window.deleteTask('${tier}', ${task.id})" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all p-1">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    `;
                    container.appendChild(item);
                });
            });

            // Filters Multiplier
            state.filters.forEach(f => { if(f) totalScore += 2; });

            // Visual Score Update
            document.getElementById('scoreText').innerText = totalScore;
            const progress = Math.min((totalScore / 22) * 100, 100);
            const ring = document.getElementById('progressRing');
            ring.style.strokeDashoffset = 138 - (138 * (progress / 100));
            
            // Color feedback based on progress
            if (progress >= 100) ring.setAttribute('stroke', '#10B981');
            else if (progress >= 50) ring.setAttribute('stroke', '#6366F1');
            else ring.setAttribute('stroke', '#94A3B8');
        }

        window.manualLink = () => {
            const code = prompt("Device ID for linking (Copy the ID from your other device):");
            if (code) alert("Device linking is currently handled via your unique Auth token. Ensure you are logged into the same session.");
        };

        window.onload = init;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #1E293B; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 1); border-radius: 1.5rem; }
        .ring-path { transition: stroke-dashoffset 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); transform: rotate(-90deg); transform-origin: center; }
        input::placeholder { color: #CBD5E1; }
        .task-input { transition: all 0.2s ease; }
        .task-input:focus { border-color: #6366F1; background: white; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 pb-40">

    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Achievement Ledger</h1>
                <div class="flex items-center gap-3 mt-2">
                    <span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase tracking-widest rounded-md">Consultant</span>
                    <i class="fa-solid fa-arrow-right text-slate-300 text-xs"></i>
                    <span class="px-2 py-0.5 bg-emerald-50 text-emerald-600 text-[10px] font-black uppercase tracking-widest rounded-md">Home Impact Developer</span>
                </div>
            </div>

            <div class="glass px-6 py-4 flex items-center gap-6 shadow-xl shadow-slate-200/50">
                <div class="text-right">
                    <div id="dateDisplay" class="font-bold text-slate-900 text-sm">...</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Daily Ledger</div>
                </div>
                <div class="h-10 w-[1px] bg-slate-200"></div>
                <div class="relative flex items-center justify-center">
                    <svg width="52" height="52" viewBox="0 0 50 50">
                        <circle cx="25" cy="25" r="22" fill="none" stroke="#F1F5F9" stroke-width="5" />
                        <circle id="progressRing" cx="25" cy="25" r="22" fill="none" stroke="#6366F1" stroke-width="5" stroke-dasharray="138" stroke-dashoffset="138" stroke-linecap="round" class="ring-path" />
                    </svg>
                    <span id="scoreText" class="absolute font-black text-sm text-slate-800">0</span>
                </div>
                <div>
                    <div class="text-lg font-black text-slate-900">22</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Target</div>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- LEFT COLUMN -->
            <div class="lg:col-span-7 space-y-8">
                
                <!-- NORTH STAR -->
                <div class="glass p-8 border-l-[12px] border-emerald-500 shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10 text-emerald-900 text-6xl">
                        <i class="fa-solid fa-compass"></i>
                    </div>
                    <div class="flex items-center gap-2 mb-4 text-emerald-600">
                        <h2 class="text-[11px] font-black uppercase tracking-[0.25em]">The North Star</h2>
                    </div>
                    <textarea id="northStar" oninput="updateNorthStar(this.value)" class="w-full bg-transparent text-xl font-bold text-slate-800 outline-none resize-none h-24 placeholder:text-slate-200" placeholder="Describe your ultimate impact objective..."></textarea>
                </div>

                <!-- STRATEGIC FILTERS -->
                <div class="glass p-8 shadow-md">
                    <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-bolt text-amber-400"></i>
                        Strategic Multipliers (+2 pts ea)
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <label class="group flex flex-col items-center p-4 rounded-2xl bg-slate-50 border border-slate-100 cursor-pointer hover:border-emerald-200 hover:bg-emerald-50/30 transition-all">
                            <input type="checkbox" id="filter0" onchange="updateFilter(0, this.checked)" class="mb-3 w-5 h-5 accent-emerald-500 rounded-lg">
                            <span class="text-[9px] font-black text-center leading-tight text-slate-600 group-hover:text-emerald-700">CLINICAL<br>IMPACT</span>
                        </label>
                        <label class="group flex flex-col items-center p-4 rounded-2xl bg-slate-50 border border-slate-100 cursor-pointer hover:border-emerald-200 hover:bg-emerald-50/30 transition-all">
                            <input type="checkbox" id="filter1" onchange="updateFilter(1, this.checked)" class="mb-3 w-5 h-5 accent-emerald-500 rounded-lg">
                            <span class="text-[9px] font-black text-center leading-tight text-slate-600 group-hover:text-emerald-700">LEVERAGE<br>RATIO</span>
                        </label>
                        <label class="group flex flex-col items-center p-4 rounded-2xl bg-slate-50 border border-slate-100 cursor-pointer hover:border-emerald-200 hover:bg-emerald-50/30 transition-all">
                            <input type="checkbox" id="filter2" onchange="updateFilter(2, this.checked)" class="mb-3 w-5 h-5 accent-emerald-500 rounded-lg">
                            <span class="text-[9px] font-black text-center leading-tight text-slate-600 group-hover:text-emerald-700">SCALABLE<br>MODEL</span>
                        </label>
                        <label class="group flex flex-col items-center p-4 rounded-2xl bg-slate-50 border border-slate-100 cursor-pointer hover:border-emerald-200 hover:bg-emerald-50/30 transition-all">
                            <input type="checkbox" id="filter3" onchange="updateFilter(3, this.checked)" class="mb-3 w-5 h-5 accent-emerald-500 rounded-lg">
                            <span class="text-[9px] font-black text-center leading-tight text-slate-600 group-hover:text-emerald-700">ASSET<br>EQUITY</span>
                        </label>
                    </div>
                </div>

                <!-- DAILY NOTES -->
                <div class="bg-[#0F172A] rounded-[2.5rem] p-10 shadow-2xl border border-slate-800">
                    <div class="flex justify-between items-center mb-8">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-indigo-500/20 flex items-center justify-center text-indigo-400">
                                <i class="fa-solid fa-pen-nib"></i>
                            </div>
                            <h2 class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-400">Daily Execution Log</h2>
                        </div>
                        <div class="flex items-center gap-2">
                            <div id="syncStatus" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">OFFLINE</div>
                            <div class="w-2 h-2 rounded-full bg-slate-700" id="syncIndicator"></div>
                        </div>
                    </div>
                    <textarea id="dailyNotes" oninput="updateNotes(this.value)" class="w-full h-80 bg-slate-800/30 rounded-2xl p-8 text-slate-300 text-base leading-relaxed outline-none border border-slate-700/50 focus:border-indigo-500/50 transition-all resize-none placeholder:text-slate-700" placeholder="Record logic, wins, and friction points here..."></textarea>
                </div>
            </div>

            <!-- RIGHT COLUMN: TASKS -->
            <div class="lg:col-span-5 space-y-6">
                
                <!-- TIER 3 -->
                <div class="glass p-6 border-t-[6px] border-emerald-500 shadow-lg">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-400">Tier 3: Legacy (+5)</h3>
                        <div class="w-8 h-8 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-500">
                            <i class="fa-solid fa-trophy text-xs"></i>
                        </div>
                    </div>
                    <div id="legacyTasks"></div>
                    <div class="mt-6 flex gap-3">
                        <input id="legacyInput" onkeydown="if(event.key==='Enter') addTask('legacy')" type="text" class="task-input flex-1 bg-slate-50 rounded-2xl px-5 text-sm font-bold outline-none border border-slate-100 h-12" placeholder="High impact milestone...">
                        <button onclick="addTask('legacy')" class="w-12 h-12 bg-emerald-500 text-white rounded-2xl shadow-lg shadow-emerald-500/30 hover:scale-105 active:scale-95 transition-all"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <!-- TIER 2 -->
                <div class="glass p-6 border-t-[6px] border-indigo-500 shadow-lg">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-400">Tier 2: Engine (+3)</h3>
                        <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500">
                            <i class="fa-solid fa-gears text-xs"></i>
                        </div>
                    </div>
                    <div id="engineTasks"></div>
                    <div class="mt-6 flex gap-3">
                        <input id="engineInput" onkeydown="if(event.key==='Enter') addTask('engine')" type="text" class="task-input flex-1 bg-slate-50 rounded-2xl px-5 text-sm font-bold outline-none border border-slate-100 h-12" placeholder="Standard workflow...">
                        <button onclick="addTask('engine')" class="w-12 h-12 bg-indigo-500 text-white rounded-2xl shadow-lg shadow-indigo-500/30 hover:scale-105 active:scale-95 transition-all"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <!-- TIER 1 -->
                <div class="glass p-6 border-t-[6px] border-blue-400 shadow-lg">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-400">Tier 1: Fuel (+1)</h3>
                        <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-500">
                            <i class="fa-solid fa-gas-pump text-xs"></i>
                        </div>
                    </div>
                    <div id="fuelTasks"></div>
                    <div class="mt-6 flex gap-3">
                        <input id="fuelInput" onkeydown="if(event.key==='Enter') addTask('fuel')" type="text" class="task-input flex-1 bg-slate-50 rounded-2xl px-5 text-sm font-bold outline-none border border-slate-100 h-12" placeholder="Administrative / Speed...">
                        <button onclick="addTask('fuel')" class="w-12 h-12 bg-blue-500 text-white rounded-2xl shadow-lg shadow-blue-500/30 hover:scale-105 active:scale-95 transition-all"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- PERSISTENT SYNC FOOTER -->
    <footer class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-slate-200 px-6 py-6 z-[100]">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-6">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Authenticated ID</span>
                    <div class="bg-slate-900 text-indigo-400 px-5 py-2.5 rounded-xl text-[11px] font-mono font-bold border border-slate-800 flex items-center gap-3">
                        <i class="fa-solid fa-fingerprint text-indigo-500/50"></i>
                        <span id="displayId" class="tracking-tight">SYNCING...</span>
                    </div>
                </div>
                <div class="hidden sm:block h-10 w-[1px] bg-slate-200"></div>
                <div class="hidden sm:flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Secure Cloud Active</span>
                </div>
            </div>

            <button onclick="manualLink()" class="w-full md:w-auto bg-indigo-600 text-white px-10 py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.25em] shadow-2xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 active:translate-y-0.5 transition-all">
                Link Another Device
            </button>
        </div>
    </footer>

</body>
</html>
